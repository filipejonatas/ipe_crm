name: CI

on:
  push:
    branches: [main]

jobs:
  shared:
    name: Shared
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shared lint
        run: npm run lint --workspace=@ipe_crm/shared

      - name: Build shared
        run: npm run build --workspace=@ipe_crm/shared

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: shared

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint --workspace=frontend

      - name: Build frontend
        run: npm run build --workspace=frontend

      - name: Run frontend tests
        run: npm run test --workspace=frontend -- --run

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: shared
    env:
      NODE_ENV: test
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 1h
      DB_SSL: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared dependency
        run: npm run build --workspace=@ipe_crm/shared

      - name: Run backend lint
        run: npm run lint --workspace=backend

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Run backend unit tests
        run: npm run test --workspace=backend

      - name: Run backend e2e tests
        run: npm run test:e2e --workspace=backend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          if-no-files-found: error
